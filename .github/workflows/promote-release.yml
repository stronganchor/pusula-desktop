name: Publish Accepted Windows Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Accepted final SemVer without the v prefix
        required: true
        type: string
      candidate_tag:
        description: Exact immutable v<version>-candidate.<40-character SHA> tag
        required: true
        type: string
      acceptance_evidence_sha256:
        description: SHA-256 of the exact canonical acceptance evidence JSON
        required: true
        type: string
      acceptance_evidence_base64:
        description: Canonical JSON as strict standard base64 (maximum 60 KiB encoded / 45 KiB decoded)
        required: true
        type: string
      confirmation:
        description: Enter PROMOTE v followed by the exact version
        required: true
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  group: pusula-windows-release
  cancel-in-progress: false

env:
  RELEASE_VERSION: ${{ inputs.version }}
  RELEASE_CANDIDATE_TAG: ${{ inputs.candidate_tag }}
  ACCEPTANCE_EVIDENCE_SHA256: ${{ inputs.acceptance_evidence_sha256 }}
  ACCEPTANCE_EVIDENCE_BASE64: ${{ inputs.acceptance_evidence_base64 }}
  PROMOTION_CONFIRMATION: ${{ inputs.confirmation }}
  RELEASE_COMMIT: ${{ github.sha }}
  RELEASE_REPOSITORY: ${{ github.repository }}

jobs:
  publish-stable:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Decode bounded canonical acceptance evidence
        shell: pwsh
        run: |
          .\scripts\Decode-ReleaseAcceptanceEvidence.ps1 `
            -Base64 $env:ACCEPTANCE_EVIDENCE_BASE64 `
            -ExpectedSha256 $env:ACCEPTANCE_EVIDENCE_SHA256 `
            -OutputPath (Join-Path $env:RUNNER_TEMP 'acceptance-evidence.json')

      - name: Install pinned Minisign verifier
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ProgressPreference = 'SilentlyContinue'
          $archive = Join-Path $env:RUNNER_TEMP 'minisign-0.12-win64.zip'
          $root = Join-Path $env:RUNNER_TEMP 'minisign-0.12'
          Invoke-WebRequest `
            -Uri 'https://github.com/jedisct1/minisign/releases/download/0.12/minisign-0.12-win64.zip' `
            -OutFile $archive
          $expectedHash = '37b600344e20c19314b2e82813db2bfdcc408b77b876f7727889dbd46d539479'
          $actualHash = (Get-FileHash -Algorithm SHA256 -LiteralPath $archive).Hash.ToLowerInvariant()
          if ($actualHash -cne $expectedHash) { throw 'Pinned Minisign archive SHA-256 verification failed.' }
          Expand-Archive -LiteralPath $archive -DestinationPath $root
          Remove-Item -LiteralPath $archive -Force
          $path = Join-Path $root 'minisign-win64\x86_64\minisign.exe'
          if (-not (Test-Path -LiteralPath $path -PathType Leaf)) { throw 'minisign.exe was not installed.' }
          "MINISIGN_PATH=$path" >> $env:GITHUB_ENV

      - name: Revalidate immutable candidate, signatures, and canonical evidence
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          ACTIONS_READ_TOKEN: ${{ github.token }}
        run: |
          .\scripts\Test-CandidatePromotion.ps1 `
            -Version $env:RELEASE_VERSION `
            -CandidateTag $env:RELEASE_CANDIDATE_TAG `
            -Repository $env:RELEASE_REPOSITORY `
            -WorkflowCommit $env:RELEASE_COMMIT `
            -AcceptanceEvidenceSha256 $env:ACCEPTANCE_EVIDENCE_SHA256 `
            -AcceptanceEvidencePath (Join-Path $env:RUNNER_TEMP 'acceptance-evidence.json') `
            -Confirmation $env:PROMOTION_CONFIRMATION `
            -DownloadDirectory (Join-Path $env:RUNNER_TEMP 'candidate-assets') `
            -ActionsToken $env:ACTIONS_READ_TOKEN `
            -MinisignPath $env:MINISIGN_PATH

      - name: Add exact evidence as the sixth stable asset
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $source = Join-Path $env:RUNNER_TEMP 'acceptance-evidence.json'
          $directory = Join-Path $env:RUNNER_TEMP 'candidate-assets'
          $name = "Pusula_$($env:RELEASE_VERSION)_acceptance-evidence.json"
          $destination = Join-Path $directory $name
          if (Test-Path -LiteralPath $destination) { throw 'Candidate unexpectedly already contains the stable evidence asset.' }
          Copy-Item -LiteralPath $source -Destination $destination
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $destination).Hash.ToLowerInvariant()
          if ($hash -cne $env:ACCEPTANCE_EVIDENCE_SHA256.ToLowerInvariant()) {
            throw 'Copied stable evidence asset changed bytes.'
          }

      - name: Create or safely resume the exact stable draft
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          .\scripts\Prepare-ResumableStableRelease.ps1 `
            -Repository $env:RELEASE_REPOSITORY `
            -Version $env:RELEASE_VERSION `
            -CandidateTag $env:RELEASE_CANDIDATE_TAG `
            -ExpectedCommit $env:RELEASE_COMMIT `
            -AssetDirectory (Join-Path $env:RUNNER_TEMP 'candidate-assets') `
            -AcceptanceEvidenceAssetName "Pusula_$($env:RELEASE_VERSION)_acceptance-evidence.json" `
            -AcceptanceEvidenceSha256 $env:ACCEPTANCE_EVIDENCE_SHA256.ToLowerInvariant()

      - name: Revalidate and publish the stable draft in one write-token process
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          .\scripts\Publish-VerifiedRelease.ps1 `
            -Mode Stable `
            -Repository $env:RELEASE_REPOSITORY `
            -Tag "v$($env:RELEASE_VERSION)" `
            -ExpectedCommit $env:RELEASE_COMMIT `
            -ExpectedVersion $env:RELEASE_VERSION `
            -AssetDirectory (Join-Path $env:RUNNER_TEMP 'candidate-assets') `
            -CandidateTag $env:RELEASE_CANDIDATE_TAG `
            -AcceptanceEvidenceAssetName "Pusula_$($env:RELEASE_VERSION)_acceptance-evidence.json" `
            -AcceptanceEvidenceSha256 $env:ACCEPTANCE_EVIDENCE_SHA256.ToLowerInvariant()
          "Published v$($env:RELEASE_VERSION) from immutable candidate $($env:RELEASE_CANDIDATE_TAG) with canonical evidence SHA-256 $($env:ACCEPTANCE_EVIDENCE_SHA256.ToLowerInvariant())" >> $env:GITHUB_STEP_SUMMARY

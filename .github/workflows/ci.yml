name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - run: npm ci
      - run: npm run build
      - run: npm run test:frontend
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --check
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: Test guarded Windows restore harness
        shell: pwsh
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\tests\restore-harness.tests.ps1
      - name: Test release policy gates
        shell: pwsh
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File .\tests\release-policy.tests.ps1
      - name: Compile release executable
        run: npm run tauri -- build --no-bundle --ci
      - name: Package unsigned offline NSIS installer
        run: npm run tauri -- bundle --bundles nsis --no-sign --ci

  gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Validate gateway
        run: |
          cargo fmt --manifest-path gateway/Cargo.toml --check
          cargo clippy --manifest-path gateway/Cargo.toml --all-targets -- -D warnings
          cargo test --manifest-path gateway/Cargo.toml
